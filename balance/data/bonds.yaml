paths:
# ══ 遮天修炼路径（境界树）══
# 阶梯抽取：玩家初始可抽境界 0（轮海）的羁绊；集齐当前境界全部羁绊并吞噬突破后，
# path_realm[id] 推进，解锁下一境界的抽取。
# rarity 按境界深度：轮海=SR，道宫/四极=SSR，化龙~准帝=UR，大帝/红尘仙/天帝=EX。
- id: zhutian
  name: 遮天
  realms:
  - name: 轮海
    bonds:
    - zt_lunhai_daojing
    - zt_lunhai_kuhai
    - zt_lunhai_mingquan
    - zt_lunhai_shenqiao
    - zt_jm_jie
    reward:
      atk_pct_delta: 0.15
    note: 苦海聚精气，肉身筑基
  - name: 道宫
    bonds:
    - zt_daogong_heart
    - zt_daogong_liver
    - zt_daogong_spleen
    - zt_daogong_lung
    - zt_daogong_kidney
    - zt_jm_dou
    reward:
      atk_pct_delta: 0.20
      crit_rate_delta: 0.05
    note: 五脏神觉醒，build 第一个分支点
  - name: 四极
    bonds:
    - zt_siji_left_arm
    - zt_siji_right_arm
    - zt_siji_left_leg
    - zt_siji_right_leg
    - zt_jm_xing
    reward:
      atk_pct_delta: 0.20
      attack_speed_delta: 0.15
    note: 淬炼四肢，装备槽/属性成型
  - name: 化龙
    bonds:
    - zt_hualong_spine_1
    - zt_hualong_spine_2
    - zt_hualong_spine_3
    - zt_jm_bing
    reward:
      atk_pct_delta: 0.25
      final_dmg_mult: 0.08
    note: 脊柱化龙，中期爆发
  - name: 仙台
    bonds:
    - zt_xiantai_zhandao
    - zt_xiantai_saint
    - zt_xiantai_dasheng
    - zt_jm_zu
    reward:
      atk_pct_delta: 0.30
      final_dmg_mult: 0.12
    note: 仙台三重（斩道/圣人/大圣）
  - name: 准帝
    bonds:
    - zt_zhundi_tribulation
    - zt_zhundi_curse_break
    - zt_jm_qian
    reward:
      final_dmg_mult: 0.15
      crit_dmg_delta: 0.30
    note: 圣体破诅咒成准帝，全书最大爽点
  - name: 大帝
    bonds:
    - zt_dadi_dao
    - zt_dadi_cauldron
    - zt_dadi_busiyao
    - zt_dadi_diershi
    - zt_dadi_xianlu
    - zt_jm_lin
    reward:
      final_dmg_mult: 0.20
    synergy_unlock: zhutian_emperor_fist
    note: 成帝→不死药→活出第二世→成仙路开启；解锁天帝拳联动
  - name: 红尘仙
    bonds:
    - zt_hongchen_nihuo
    - zt_hongchen_zikhan
    - zt_hongchen_jiqu
    - zt_hongchen_xian
    - zt_jm_zhe
    reward:
      final_dmg_mult: 0.25
    note: 逆活第三世→自斩一刀→汲取不死物质→红尘为仙
  - name: 天帝
    bonds:
    - zt_tiandi_wandao
    - zt_tiandi_quan
    - zt_tiandi_duduan
    - zt_tiandi
    - zt_jm_shu
    reward:
      status: heaven_emperor
      final_dmg_mult: 0.35
    synergy_unlock: zhutian_emperor_fist
    note: 万道相合→天帝拳成→独断万古→天帝果位
