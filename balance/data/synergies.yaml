# 联动规则 (GDD §7) — 重构后：触发条件用 path_realm（修到某境界），取代 skill_owned
# trigger.all 全部满足才触发。effect 走 final_dmg_mult 等乘区。
#
# 触发条件语义：
#   bond_devoured_set  该体系已修满所有境界。
#   path_realm         {path_id: ">=N"}  某体系修到第 N 境（0-indexed）。
#   equipment_affix    装备了该词条。
synergies:
  # ── 天帝之拳（修满遮天 + 起点技能自动满足）──
  - id: zhutian_emperor_fist
    name: 天帝之拳
    rarity: SSR
    trigger:
      all:
        - bond_devoured_set: zhutian        # 修满遮天
    effect:
      final_dmg_mult: 1.0                   # 最终伤害 +100%
    note: 选了遮天体系（起点技能=天帝拳），修满即触发

  # ── 三重联动：天帝雷罚（修满 + 装备联动增幅）──
  - id: emperor_thunder_judgment
    name: 天帝雷罚
    rarity: EX
    trigger:
      all:
        - bond_devoured_set: zhutian
        - equipment_affix: synergy_amp      # 装备"联动增幅"
    effect:
      final_dmg_mult: 2.0                   # 最终伤害 +200%
      atk_pct_delta: 0.30
    note: 三重终极——遮天满境+天帝拳+联动增幅

  # ── 九秘合一·神禁（集齐全部 9 个九秘羁绊触发）──
  # 九秘现在是境界子羁绊（zt_jm_*），修满 9 境界 = 自动集齐全部九秘
  - id: zhutian_nine_secrets
    name: 九秘合一·神禁
    rarity: EX
    trigger:
      all:
        - bond_devoured_set: zhutian        # 修满遮天 = 集齐全部 9 个九秘羁绊
    effect:
      final_dmg_mult: 2.0                   # 最终伤害 +200%
    note: 九秘从技能转为羁绊，修满 9 境界自动集齐触发
