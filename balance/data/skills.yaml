# 技能定义 (GDD §4) — 重构后：技能 = 体系入口（不再是抽取消费）
# 每个体系 1 个起点技能，选了体系自动获得，随境界突破自动升级。
# 九秘从技能转为遮天境界子羁绊（见 bonds.yaml）。
#
# tags 约定：physical/magic/summon；single_target/aoe/chain/pierce；
#            fire/ice/thunder/poison；dot/buff/debuff
skills:
  # ══ 遮天起点技能（选了遮天体系自动获得，随境界自动升级）══
  - id: emperor_fist
    name: 天帝拳
    rarity: SR                       # 起点
    tags: [physical, single_target]
    atk_ratio: 1.5                   # 基础物理倍率
    note: 遮天体系入口——选了才解锁遮天羁绊池。随境界突破自动升级：
          化龙→+穿甲（龙骨之力）
          仙台→+AOE（大圣范围）
          准帝→+真伤（圣体破诅咒）
          大帝→+最终伤害（万道相合）
          天帝→+肉度100%（天帝之躯）+ final_dmg 翻倍
