# 技能定义 (GDD §4)
# 技能 = 基础机制 + 词条槽。最高 5 级（重复抽到 = 升级）。
# 机制优先设计：覆盖 物理/法术/召唤/控制/生存/经济 六大定位。
# 抽取规则（GDD §4.3）：每波 1 次升级机会，Boss 波 2 次。
# 每个选项 50% 新技能 / 50% 已有词条，按 rarity_weights 加权。
#
# tags 约定：physical/magic/summon；single_target/aoe/chain/pierce；
#            fire/ice/thunder/poison；dot/buff/debuff
skills:
  # ── 物理单体/爆发 ──
  - id: basic_strike
    name: 普攻
    rarity: common
    tags: [physical, single_target]
    atk_ratio: 1.0
    base_affixes: []

  - id: emperor_fist
    name: 天帝拳
    rarity: legendary
    tags: [physical, single_target]
    atk_ratio: 2.0
