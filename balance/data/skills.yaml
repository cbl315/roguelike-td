# 技能定义 (GDD §4) — 重构后：技能 = 体系入口（不再是抽取消费）
# 每个体系 1 个起点技能，选了体系自动获得，随境界突破自动升级。
# 九秘从技能转为遮天境界子羁绊（见 bonds.yaml）。
#
# tags 约定：physical/magic/summon；single_target/aoe/chain/pierce；
#            fire/ice/thunder/poison；dot/buff/debuff
skills:
  # ══ 遮天起点技能（选了遮天体系自动获得，随境界自动升级）══
  - id: emperor_fist
    name: 天帝拳
    rarity: SR                       # 起点
    tags: [physical, single_target]
    atk_ratio: 1.5                   # 基础物理倍率
    note: 遮天体系入口——选了才解锁遮天羁绊池。随境界突破自动升级：
          化龙→+穿甲（龙骨之力）
          仙台→+AOE（大圣范围）
          准帝→+真伤（圣体破诅咒）
          大帝→+最终伤害（万道相合）
          天帝→+肉度100%（天帝之躯）+ final_dmg 翻倍

  # ══ 星辰变起点技能（选了星辰变体系自动获得，随境界自动升级）══
  - id: xc_xingchenbian
    name: 星辰变·功法
    rarity: SR                       # 起点
    tags: [magic, aoe]
    atk_ratio: 1.5                   # 基础法术倍率
    note: 星辰变体系入口——选了才解锁星辰变羁绊池。随境界突破自动升级：
          流星→+AOE（流星雨）
          星核→+单体爆发（星核击）
          行星→+弹射（轨道连锁）
          恒星→+火属性AOE（恒星耀斑）
          黑洞→+吞噬（击杀回血）
          宇宙→全属性法术翻倍

  # ══ 宠魅起点技能（选了宠魅体系自动获得，随境界自动升级）══
  - id: cm_summon_moxie
    name: 召唤·莫邪
    rarity: SR                       # 起点
    tags: [summon, physical]
    atk_ratio: 1.2                   # 基础倍率
    note: 宠魅体系入口——选了才解锁宠魅羁绊池。随境界突破自动升级：
          魂士→莫邪进化六尾（+邪焰）
          魂师→莫邪进化九尾（+AOE）
          魂宰→莫邪进化七罪狐（+真伤）
          千年→莫邪终极紫帝（+final_dmg）
          魂朽→半魔化变身（吞噬白魇魔）
          万年→魔人完全体（常驻）
